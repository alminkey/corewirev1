name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CooreWireV1
    env:
      PYTHONPATH: apps/api:apps/workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: CooreWireV1/pnpm-lock.yaml

      - name: Install Python test deps
        run: python -m pip install pytest fastapi sqlalchemy pydantic alembic psycopg2-binary

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: API tests
        run: pytest apps/api/tests -q

      - name: Integration tests
        run: pytest tests/integration -q

      - name: Web tests
        run: pnpm --dir apps/web test

      - name: Repo structure
        run: pnpm test:repo
