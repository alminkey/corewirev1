apiVersion: apps/v1
kind: Deployment
metadata:
  name: corewire-api
  namespace: corewire
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corewire-api
  template:
    metadata:
      labels:
        app: corewire-api
    spec:
      containers:
        - name: api
          image: corewire/api:latest
          ports:
            - containerPort: 8000
          env:
            - name: COREWIRE_DATABASE_URL
              value: postgresql://corewire:corewire@postgres:5432/corewire
---
apiVersion: v1
kind: Service
metadata:
  name: corewire-api
  namespace: corewire
spec:
  selector:
    app: corewire-api
  ports:
    - port: 8000
      targetPort: 8000
